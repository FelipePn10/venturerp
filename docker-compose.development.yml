services:
  postgres-development:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    container_name: venturerp-postgres-development
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?POSTGRES_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-venturerp_development}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --data-checksums --auth-host=scram-sha-256"
      TZ: UTC
      PGTZ: UTC
    command: ["postgres", "-c", "max_connections=40", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "work_mem=4MB", "-c", "maintenance_work_mem=64MB", "-c", "password_encryption=scram-sha-256"]
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - development_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    stop_grace_period: 45s
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate-development:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    depends_on:
      postgres-development:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_ADMIN_USER}:${POSTGRES_ADMIN_PASSWORD}@postgres-development:5432/${POSTGRES_DB}?sslmode=disable", "up"]

volumes:
  development_postgres_data:
    name: venturerp_development_postgres_data
