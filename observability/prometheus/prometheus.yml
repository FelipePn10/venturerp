global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: venturerp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5070"]
        labels:
          service: venturerp-api
          env: production

  - job_name: venturerp-api-development
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5071"]
        labels:
          service: venturerp-api-development
          env: development

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
          env: production

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          service: alloy
          env: production

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: venturerp-postgres
          env: production

  - job_name: postgres-development
    static_configs:
      - targets: ["postgres-exporter-development:9187"]
        labels:
          service: venturerp-postgres-development
          env: development
