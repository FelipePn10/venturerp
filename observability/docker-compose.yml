# Observability stack — standalone production deployment.
# Run from /opt/observability/ (symlink to this directory).
# The API runs outside Docker (systemd service) so this stack is independent.
#
#   docker compose up -d
#
# All ports bound to 127.0.0.1 — access through Nginx reverse proxy only.

services:
  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_SERVER_ROOT_URL: https://grafana.venturerp.com
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - loki_data:/loki
      - ./loki/local-config.yml:/etc/loki/local-config.yml:ro
    ports:
      - "127.0.0.1:3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - tempo_data:/tmp/tempo
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "127.0.0.1:3200:3200"
    user: root

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"

  alloy:
    image: grafana/alloy:v1.17.0
    restart: unless-stopped
    pid: host
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - alloy_data:/var/lib/alloy/data
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    ports:
      - "127.0.0.1:12345:12345"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_READONLY_USER:?POSTGRES_READONLY_USER is required}:${POSTGRES_READONLY_PASSWORD:?POSTGRES_READONLY_PASSWORD is required}@venturerp-postgres:5432/venturerp?sslmode=disable"
    networks:
      - default
      - database
    ports:
      - "127.0.0.1:9187:9187"

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
  alloy_data:

networks:
  database:
    external: true
    name: database_default
