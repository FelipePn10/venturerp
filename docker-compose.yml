# VentureERP — full stack for a single-node (small shop) deployment.
#
#   docker compose up -d              # postgres → migrations → api
#   docker compose --profile backup up -d   # also run the scheduled backup sidecar
#   docker compose run --rm migrate         # re-apply migrations on demand
#
# Secrets come from the host environment / an .env file (never committed).
# Inside the compose network the database host is the service name `postgres`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panossoerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panossoerp_10203040}
      POSTGRES_DB: ${POSTGRES_DB:-panossoerpdatabase}
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panossoerp} -d ${POSTGRES_DB:-panossoerpdatabase}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies all pending migrations, then exits. The api waits for it.
  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-panossoerp}:${POSTGRES_PASSWORD:-panossoerp_10203040}@postgres:5432/${POSTGRES_DB:-panossoerpdatabase}?sslmode=disable"
      - "up"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: panossoerp/api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: "5070"
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgres://${POSTGRES_USER:-panossoerp}:${POSTGRES_PASSWORD:-panossoerp_10203040}@postgres:5432/${POSTGRES_DB:-panossoerpdatabase}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${API_PORT:-5070}:5070"

  # Scheduled logical backups (pg_dump custom format) with retention pruning.
  # Enabled only with `--profile backup`. Writes to ./backups on the host.
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-panossoerp}
      PGPASSWORD: ${POSTGRES_PASSWORD:-panossoerp_10203040}
      PGDATABASE: ${POSTGRES_DB:-panossoerpdatabase}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/scripts/backup-loop.sh"]

volumes:
  pgdata:
