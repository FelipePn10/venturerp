# Ambiente de TESTES — banco isolado, nunca afeta produção.
# Uso: docker compose -f docker-compose.test.yml up -d
#
# Postgres teste → porta 5433
# API teste      → porta 5071  (DATABASE_URL e JWT_SECRET definidos aqui)

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: panossoerp-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: panossoerp_test
      POSTGRES_PASSWORD: panossoerp_test_pass
      POSTGRES_DB: panossoerpdatabase_test
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panossoerp_test -d panossoerpdatabase_test"]
      interval: 5s
      timeout: 5s
      retries: 15

  migrate-test:
    image: migrate/migrate:v4.17.1
    container_name: panossoerp-migrate-test
    restart: "no"
    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://panossoerp_test:panossoerp_test_pass@postgres-test:5432/panossoerpdatabase_test?sslmode=disable"
      - "up"

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: panossoerp/api:test
    container_name: panossoerp-api-test
    restart: unless-stopped
    depends_on:
      postgres-test:
        condition: service_healthy
      migrate-test:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: "5071"
      ENV: "test"
      LOG_LEVEL: "debug"
      DATABASE_URL: "postgres://panossoerp_test:panossoerp_test_pass@postgres-test:5432/panossoerpdatabase_test?sslmode=disable"
      JWT_SECRET: "test_jwt_secret_panossoerp_2026_DO_NOT_USE_IN_PROD"
      CORS_ALLOWED_ORIGINS: "*"
      METRICS_ENABLED: "false"
      RATE_LIMIT_RPS: "200"
      RATE_LIMIT_BURST: "400"
      AUTH_RATE_LIMIT_RPM: "200"
      AUTH_RATE_LIMIT_BURST: "100"
    ports:
      - "5071:5071"
