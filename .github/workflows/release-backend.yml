name: Release backend

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'FelipePn10/venturerp'
    runs-on: ubuntu-latest
    env:
      # Raise only in an intentional compatibility-breaking PR. Backend patch
      # releases must not lock out already-installed desktop 1.0.1 clients.
      MIN_CLIENT_VERSION: "1.0.1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [[ "${version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]
          printf 'version=%s\n' "${version}" >>"${GITHUB_OUTPUT}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            MIN_CLIENT_VERSION=${{ env.MIN_CLIENT_VERSION }}
          tags: |
            ghcr.io/felipepn10/panossoerp:${{ github.ref_name }}
            ghcr.io/felipepn10/panossoerp:latest

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/felipepn10/panossoerp
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "VentureERP ${GITHUB_REF_NAME}"
