version: "2"

sql:
  - schema: "migrations/"
    queries: "internal/infrastructure/database/queries/"
    engine: "postgresql"

    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/database/sqlc/"
        sql_package: "pgx/v5"

        rename:
          employee: "EmployeeLegacy"
          employees: "Employee"

        overrides:
          - column: "item_structures.quantity"
            go_type: "float64"

          - column: "item_structures.loss_percentage"
            go_type: "float64"

          - column: "allocation_base_items.amount"
            go_type: "float64"

          - column: "allocation_base_items.percentage"
            go_type: "float64"

          - column: "cost_centers.parent_code"
            go_type:
              type: "int32"
              pointer: true

          - column: "cost_centers.end_date"
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int32"
              pointer: true

          - db_type: "pg_catalog.int8"
            nullable: true
            go_type:
              type: "int64"
              pointer: true

          - db_type: "pg_catalog.date"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - db_type: "pg_catalog.timestamp"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          - db_type: "operation_origin_enum"
            go_type:
              import: "github.com/FelipePn10/panossoerp/internal/infrastructure/database/sqltypes"
              type: "OperationOriginEnum"

          - db_type: "operation_situation_enum"
            go_type:
              import: "github.com/FelipePn10/panossoerp/internal/infrastructure/database/sqltypes"
              type: "OperationSituationEnum"

          - db_type: "route_situation_enum"
            go_type:
              import: "github.com/FelipePn10/panossoerp/internal/infrastructure/database/sqltypes"
              type: "RouteSituationEnum"

          - db_type: "route_op_situation_enum"
            go_type:
              import: "github.com/FelipePn10/panossoerp/internal/infrastructure/database/sqltypes"
              type: "RouteOpSituationEnum"

          - db_type: "customer_category_enum"
