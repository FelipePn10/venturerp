# Ambiente de APRESENTAÇÃO (demo) — banco isolado, populado com ~1 ano de
# operação fictícia para demonstrações a clientes.
# Uso:
#   docker compose -f docker-compose.demo.yml up -d        # sobe postgres + migra + api
#   make demo-seed                                          # popula o banco (idempotente)
#
# Postgres demo → porta 5434
# API demo      → porta 5072
#
# NUNCA aponta para produção. Segredos são fornecidos pelo operador.

services:
  postgres-demo:
    image: postgres:16-alpine
    container_name: panossoerp-postgres-demo
    restart: unless-stopped
    environment:
      POSTGRES_USER: panossoerp_demo
      POSTGRES_PASSWORD: ${DEMO_DB_PASSWORD:?defina DEMO_DB_PASSWORD} # ggignore: environment variable, not a hardcoded secret
      POSTGRES_DB: panossoerpdatabase_demo
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata_demo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panossoerp_demo -d panossoerpdatabase_demo"]
      interval: 5s
      timeout: 5s
      retries: 15

  migrate-demo:
    image: migrate/migrate:v4.17.1
    container_name: panossoerp-migrate-demo
    restart: "no"
    depends_on:
      postgres-demo:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro,z
    working_dir: /migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://panossoerp_demo:${DEMO_DB_PASSWORD:?defina DEMO_DB_PASSWORD}@postgres-demo:5432/panossoerpdatabase_demo?sslmode=disable" # ggignore: environment variable
      - "up"

  api-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: panossoerp/api:demo
    container_name: panossoerp-api-demo
    restart: unless-stopped
    depends_on:
      postgres-demo:
        condition: service_healthy
      migrate-demo:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: "5072"
      ENV: "production"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgres://panossoerp_demo:${DEMO_DB_PASSWORD:?defina DEMO_DB_PASSWORD}@postgres-demo:5432/panossoerpdatabase_demo?sslmode=disable" # ggignore: environment variable
      JWT_SECRET: ${DEMO_JWT_SECRET:?defina DEMO_JWT_SECRET com pelo menos 32 caracteres}
      CORS_ALLOWED_ORIGINS: "*"
      METRICS_ENABLED: "false"
      RATE_LIMIT_RPS: "300"
      RATE_LIMIT_BURST: "600"
      AUTH_RATE_LIMIT_RPM: "300"
      AUTH_RATE_LIMIT_BURST: "150"
    volumes:
      # A app carrega config via viper.SetConfigFile(".env"); o arquivo precisa existir.
      - ./.env.demo:/app/.env:ro,z
    # O HEALTHCHECK da imagem aponta p/ 5070; aqui a API escuta na 5072.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5072/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    ports:
      - "127.0.0.1:5072:5072"

volumes:
  pgdata_demo:
